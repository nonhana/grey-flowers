allowBuilds:
  '@parcel/watcher': true
  '@prisma/engines': true
  esbuild: true
  prisma: true
  sharp: true
  vue-demi: true

catalogMode: prefer
cleanupUnusedCatalogs: true

shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - chokidar@4.0.3
  - undici-types@6.21.0
  - semver@6.3.1

catalog:
  '@antfu/eslint-config': ^9.1.0
  '@golar/vue': ^0.1.10
  '@lucide/vue': ^1.25.0
  '@nuxt/fonts': ^0.14.0
  '@nuxt/image': ^2.0.0
  '@nuxtjs/color-mode': ^4.0.1
  '@nuxtjs/mdc': ^0.22.2
  '@nuxtjs/seo': ^5.3.3
  '@pinia/nuxt': ^1.0.1
  '@prisma/adapter-pg': ^7.9.0
  '@prisma/client': ^7.9.0
  '@takumi-rs/core': ^2.4.0
  '@types/jsonwebtoken': ^9.0.10
  '@types/node': ^26.1.1
  '@types/vivus': ^0.4.7
  '@unocss/eslint-plugin': ^66.7.5
  '@unocss/nuxt': ^66.7.5
  '@unocss/preset-rem-to-px': ^66.7.5
  '@unocss/reset': ^66.7.5
  '@vueuse/core': ^14.3.0
  '@vueuse/nuxt': ^14.3.0
  '@vueuse/router': ^14.3.0
  bcryptjs: ^3.0.3
  dotenv: ^17.4.2
  eslint: ^10.7.0
  feed: ^6.0.0
  golar: ^0.1.10
  gsap: ^3.15.0
  hana-img-viewer: ^4.0.0
  jose: ^6.2.3
  nuxt: ^4.5.0
  nuxt-og-image: ^6.7.4
  pinia: ^4.0.2
  pinia-plugin-persistedstate: ^4.7.1
  prisma: ^7.9.0
  rehype-sanitize: 6.0.0
  resend: ^6.17.2
  typescript: 6.0.3
  unocss: ^66.7.5
  unocss-preset-scrollbar: ^4.0.0
  vivus: ^0.4.6
  vue: ^3.5.40
  vue-router: ^5.2.0
  zod: ^4.4.3
onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@prisma/client'
  - '@prisma/engines'
  - better-sqlite3
  - esbuild
  - prisma
  - sharp
  - vue-demi
peerDependencyRules:
  allowedVersions:
    '@unhead/vue': '2'
    citty: '0.2'
    magicast: '0.5'
