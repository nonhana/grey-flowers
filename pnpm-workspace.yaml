  - undici-types@6.21.0
  - semver@6.3.1

catalog:
  '@antfu/eslint-config': ^9.0.0
  '@iconify-json/lucide': ^1.2.108
  '@lucide/vue': ^1.16.0
  '@nuxt/fonts': ^0.14.0
  '@nuxt/icon': ^2.2.2
  '@nuxt/image': ^2.0.0
  '@nuxtjs/color-mode': ^4.0.0
  '@nuxtjs/mdc': ^0.22.0
  '@nuxtjs/seo': ^5.1.3
  '@pinia/nuxt': ^0.11.3
  '@prisma/adapter-pg': ^7.8.0
  '@prisma/client': ^7.8.0
  '@takumi-rs/core': ^1.1.2
  '@types/bcrypt': ^6.0.0
  '@types/jsonwebtoken': ^9.0.10
  '@types/node': ^25.8.0
  '@types/vivus': ^0.4.7
  '@unocss/eslint-plugin': ^66.6.8
  '@unocss/nuxt': ^66.6.8
  '@unocss/preset-rem-to-px': ^66.6.8
  '@unocss/reset': ^66.6.8
  '@vueuse/core': ^14.3.0
  '@vueuse/nuxt': ^14.3.0
  '@vueuse/router': ^14.3.0
  bcrypt: ^6.0.0
  dayjs: ^1.11.20
  dotenv: ^17.4.2
  eslint: ^10.4.0
  feed: ^5.2.1
  gsap: ^3.15.0
  hana-img-viewer: ^4.0.0
  jose: ^6.2.3
  nuxt: ^4.4.5
  nuxt-og-image: 6.5.1
  pinia: ^3.0.4
  pinia-plugin-persistedstate: ^4.7.1
  prisma: ^7.8.0
  rehype-sanitize: 6.0.0
  resend: ^6.12.3
  sass-embedded: ^1.99.0
  typescript: 5.9.3
  unocss: ^66.6.8
  unocss-preset-scrollbar: ^4.0.0
  vivus: ^0.4.6
  vue: ^3.5.34
  vue-router: ^5.0.7
  zod: ^4.4.3
onlyBuiltDependencies:
